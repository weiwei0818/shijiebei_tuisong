<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>世界杯比分播报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    color: #e2e8f0; padding: 20px;
  }
  .header {
    text-align: center; margin-top: 30px; margin-bottom: 20px;
  }
  .header .icon { font-size: 64px; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  .header .date { font-size: 14px; color: #94a3b8; margin-top: 4px; }

  .player-card {
    background: rgba(255,255,255,0.08);
    border-radius: 16px; padding: 28px 24px;
    width: 100%; max-width: 400px; text-align: center;
    margin-bottom: 24px;
  }
  .player-card .status {
    font-size: 13px; color: #fbbf24; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .player-card audio {
    width: 100%; margin: 8px 0;
  }
  .btn {
    display: inline-block; padding: 10px 28px; border-radius: 24px;
    border: none; font-size: 15px; font-weight: 600; cursor: pointer;
    margin: 6px; transition: all 0.2s;
  }
  .btn-play {
    background: #22c55e; color: #0f172a;
  }
  .btn-play:hover { background: #16a34a; }
  .btn-refresh {
    background: rgba(255,255,255,0.1); color: #e2e8f0;
  }
  .btn-refresh:hover { background: rgba(255,255,255,0.2); }

  .match-list {
    width: 100%; max-width: 400px;
  }
  .match-list h3 {
    font-size: 15px; color: #94a3b8; margin-bottom: 12px;
    text-align: center; font-weight: 500;
  }
  .match-card {
    background: rgba(255,255,255,0.06);
    border-radius: 12px; padding: 16px 18px;
    margin-bottom: 10px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .match-team { font-size: 15px; font-weight: 500; flex: 1; }
  .match-team.away { text-align: right; }
  .match-score {
    font-size: 22px; font-weight: 800; padding: 0 16px;
    color: #fbbf24; letter-spacing: 2px;
  }
  .match-vs { font-size: 12px; color: #64748b; margin: 0 4px; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: #64748b;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  .footer {
    margin-top: auto; padding: 20px; text-align: center;
    font-size: 12px; color: #475569;
  }
</style>
</head>
<body>

<div class="header">
  <div class="icon">⚽</div>
  <h1>世界杯比分播报</h1>
  <div class="date" id="dateDisplay">--</div>
</div>

<div class="player-card">
  <div class="status" id="audioStatus">
    <span class="status-dot"></span> 正在加载语音...
  </div>
  <audio id="audioPlayer" controls preload="auto">
    <source src="broadcast.mp3" type="audio/mpeg">
  </audio>
  <div style="margin-top:12px">
    <button class="btn btn-play" onclick="document.getElementById('audioPlayer').play()">
      ▶ 播放
    </button>
    <button class="btn btn-refresh" onclick="location.reload()">
      ↻ 刷新
    </button>
  </div>
</div>

<div class="match-list" id="matchList"></div>

<div class="empty-state" id="emptyState" style="display:none">
  <div class="icon">🌤</div>
  <p>今天凌晨没有比赛</p>
  <p style="font-size:13px;margin-top:4px">请稍后再来看看</p>
</div>

<div class="footer">数据更新时间：<span id="updateTime">--</span></div>

<script>
(async function() {
  const audio = document.getElementById('audioPlayer');
  const statusEl = document.getElementById('audioStatus');

  // Auto-play on load (browsers may block this; user interaction is the workaround)
  audio.play().catch(() => {
    statusEl.innerHTML = '<span class="status-dot"></span> 点击下方按钮播放';
  });

  audio.onplaying = () => {
    statusEl.innerHTML = '<span class="status-dot"></span> 正在播放...';
  };
  audio.onpause = () => {
    statusEl.innerHTML = '<span class="status-dot"></span> 语音已就绪';
  };
  audio.onended = () => {
    statusEl.innerHTML = '✅ 播放完毕';
  };

  // Load match data
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    const data = await resp.json();

    document.getElementById('dateDisplay').textContent =
      data.date + ' ' + data.time + ' 更新';
    document.getElementById('updateTime').textContent =
      data.date + ' ' + data.time;

    if (data.matches && data.matches.length > 0) {
      const list = document.getElementById('matchList');
      list.innerHTML = '<h3>📋 比赛结果</h3>' +
        data.matches.map((m, i) => `
          <div class="match-card">
            <span class="match-team">${m.home_team}</span>
            <span class="match-score">${m.home_score} - ${m.away_score}</span>
            <span class="match-team away">${m.away_team}</span>
          </div>
        `).join('');
      document.getElementById('emptyState').style.display = 'none';
    } else {
      document.getElementById('matchList').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('emptyState').querySelector('p').textContent =
      '暂时无法加载数据';
  }
})();
</script>

</body>
</html>
