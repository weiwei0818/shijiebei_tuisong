name: Daily Stock Broadcast

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run stock broadcast script
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: python stock_broadcast.py --push

      - name: Commit quotes tracking
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add quotes_used.json
          git diff --cached --quiet || git commit -m "update quotes tracking"
          git push
