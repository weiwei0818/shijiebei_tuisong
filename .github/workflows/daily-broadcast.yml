name: Daily World Cup Broadcast

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install edge-tts

      - name: Run broadcast script
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          AUDIO_BASE_URL: https://weiwei0818.github.io/shijiebei_tuisong
        run: python worldcup_broadcast.py --push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          force_orphan: true
